spring.application.name=ProctorX
spring.config.import=optional:file:.env[.properties]
# ===============================
# Server
# ===============================
server.port=${PORT:8080}


# ===============================
# Database (Render / Cloud MySQL)
# ===============================
# server.port=9080
# spring.datasource.url=jdbc:mysql://localhost:3306/proctorxonline?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# spring.datasource.username=root
# spring.datasource.password=Root@123
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Timezone
# ===============================
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SESSION COOKIE (CRITICAL)
# ===============================
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile